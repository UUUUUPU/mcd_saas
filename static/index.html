<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
   <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.5/dist/full.css" rel="stylesheet">
  <title>Générateur MCD → MLD → SQL</title>

  <!-- TailwindCSS + DaisyUI CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      daisyui: {
        themes: ["light", "dark", "cupcake"]
      }
    }
  </script>

  <!-- Optionnel : ton CSS perso -->
  <link href="./static/css/output.css" rel="stylesheet">
</head>

<body data-theme="cupcake" class="bg-base-200 min-h-screen p-8">

  <div class="max-w-6xl mx-auto">

    <!-- TITRE -->
    <h1 class="text-5xl font-extrabold mb-10 text-center text-primary">Générateur MCD → MLD → SQL</h1>

    <!-- FORMULAIRE -->
    <div class="card bg-base-100 shadow-lg rounded-xl mb-10">
      <div class="card-body">
        <form id="uploadForm" class="space-y-6">
          <div>
            <label class="font-semibold mb-2 block">Choisissez votre fichier MCD :</label>
            <input type="file" id="file" class="file-input file-input-bordered file-input-primary w-full" required>
          </div>

          <div>
            <label class="font-semibold mb-2 block">SGBD :</label>
            <select id="db" class="select select-bordered select-primary w-full">
              <option value="mysql">MySQL</option>
              <option value="postgres">PostgreSQL</option>
              <option value="sqlite">SQLite</option>
            </select>
          </div>

          <button class="btn btn-primary w-full text-lg font-semibold" type="submit">Générer MLD et SQL</button>
        </form>
      </div>
    </div>

    <!-- RESULTATS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
      <div class="card bg-base-100 shadow-md rounded-lg p-4">
        <h3 class="font-bold text-lg mb-3 text-primary">MCD</h3>
        <textarea id="mcdOutput" class="textarea textarea-bordered w-full h-64" readonly></textarea>
      </div>
      <div class="card bg-base-100 shadow-md rounded-lg p-4">
        <h3 class="font-bold text-lg mb-3 text-secondary">MLD</h3>
        <textarea id="mldOutput" class="textarea textarea-bordered w-full h-64" readonly></textarea>
      </div>
      <div class="card bg-base-100 shadow-md rounded-lg p-4">
        <h3 class="font-bold text-lg mb-3 text-accent">SQL</h3>
        <textarea id="sqlOutput" class="textarea textarea-bordered w-full h-64" readonly></textarea>
      </div>
    </div>

    <!-- TELECHARGEMENTS -->
    <div class="card bg-base-100 shadow-lg rounded-xl">
      <div class="card-body">
        <h3 class="card-title mb-4 text-lg font-bold text-primary">Téléchargements</h3>
        <div class="flex flex-wrap gap-4">
          <a id="downloadMCD" href="#" download class="btn btn-outline btn-primary flex-1">Télécharger MCD (PNG)</a>
          <a id="downloadMLD" href="#" download class="btn btn-outline btn-secondary flex-1">Télécharger MLD (TXT)</a>
          <a id="downloadSQL" href="#" download class="btn btn-outline btn-accent flex-1">Télécharger SQL</a>
        </div>
      </div>
    </div>

  </div>

  <!-- SCRIPT JS -->
  <script>
    const form = document.getElementById('uploadForm');

    form.addEventListener('submit', async e => {
      e.preventDefault();

      const fileInput = document.getElementById('file');
      const dbSelect = document.getElementById('db');

      if (!fileInput.files.length) {
        alert("Choisissez un fichier !");
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('db', dbSelect.value);

      try {
        const res = await fetch('/generate', { method: 'POST', body: formData });
        if (!res.ok) throw new Error("Erreur serveur");

        const data = await res.json();

        document.getElementById('mcdOutput').value = JSON.stringify(data.mcd, null, 2);
        document.getElementById('mldOutput').value = JSON.stringify(data.mld, null, 2);
        document.getElementById('sqlOutput').value = data.sql;

        document.getElementById('downloadMCD').href = data.mcd_img;
        document.getElementById('downloadMLD').href = data.mld_file;
        document.getElementById('downloadSQL').href = data.sql_file;

      } catch (err) {
        alert("Erreur: " + err.message);
        console.error(err);
      }
    });
  </script>

</body>
</html>
